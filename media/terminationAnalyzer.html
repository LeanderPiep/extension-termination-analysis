<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 style-src {{CSP_SOURCE}};
                 script-src {{CSP_SOURCE}};">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Termination Analyzer</title>

  <link rel="stylesheet" href="{{CSS_URI}}">
</head>
<body>
  <div
    id="root"
    class="container"
    data-params='{{PARAMS_JSON}}'
  >
    <h1>Termination Analyzer</h1>

    <div class="section">
      <div class="fn-label">Function to Analyze:</div>
      <div class="fn-name">{{FUNCTION_NAME}}</div>
    </div>

    <div class="section">
      <div class="row">
        <label>
          <input id="specifyInputs" type="checkbox" />
          Specify Inputs
        </label>
      </div>

      <div class="hint">
        If enabled, specify numeric ranges for each input parameter.
      </div>

      <div id="inputsSection" class="inputs hidden">
        <div class="inputs-title">Input ranges</div>
        <div id="paramsContainer"></div>
        <div class="hint">
          Assuming numeric inputs (int/float/double) for now.
        </div>
      </div>
    </div>
  </div>

  <script src="{{JS_URI}}" defer></script>
</body>
</html>
