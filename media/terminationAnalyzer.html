<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 style-src {{CSP_SOURCE}};
                 script-src {{CSP_SOURCE}};">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Termination Analyzer</title>

  <link rel="stylesheet" href="{{CSS_URI}}">
</head>
<body>
  <div
    id="root"
    class="container"
    data-params='{{PARAMS_JSON}}'
  >
    <h1>Termination Analyzer</h1>

    <!-- Function line: label + name inline -->
    <div class="fn-line">
      <span class="fn-label">Function:</span>
      <span class="fn-name">{{FUNCTION_NAME}}</span>
    </div>

    <!-- Settings container -->
    <div class="settings">
      <div class="settings-header">Settings</div>

      <div class="setting-row">
        <span class="setting-label">Specify Inputs</span>
        <input id="specifyInputs" type="checkbox" />
      </div>

      <div id="inputsSection" class="inputs hidden">
        <div class="inputs-title">Input ranges</div>
        <div id="paramsContainer"></div>
      </div>
    </div>
  </div>

  <script src="{{JS_URI}}" defer></script>
</body>
</html>
